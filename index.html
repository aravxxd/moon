<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>For Mooniee</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body{
      overflow:hidden;
      height:100vh;
      background: radial-gradient(circle at top, #1f3d2d, #07110c 80%);
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      color:white;
      position:relative;
    }

    /* Stars */
    .star{
      position:absolute;
      width:2px;
      height:2px;
      background:white;
      border-radius:50%;
      opacity:0.8;
      animation: fall linear infinite;
    }

    @keyframes fall{
      0%{
        transform:translateY(-100vh) translateX(0);
        opacity:0;
      }
      10%{
        opacity:1;
      }
      100%{
        transform:translateY(100vh) translateX(50px);
        opacity:0;
      }
    }

    .content{
      text-align:center;
      z-index:2;
      animation: fadeIn 2s ease;
    }

    h1{
      font-size:4.5rem;
      letter-spacing:4px;
      color:#d8ffe5;
      text-shadow:
        0 0 10px rgba(173,255,214,0.8),
        0 0 25px rgba(120,255,180,0.4);
    }

    .small{
      margin-top:10px;
      font-size:0.9rem;
      letter-spacing:3px;
      color:#9cc7ab;
    }

    .btn{
      margin-top:50px;
      padding:14px 40px;
      border:none;
      border-radius:40px;
      background:#8dffb4;
      color:#04110a;
      font-size:1rem;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s ease;
      box-shadow:
        0 0 15px #8dffb4,
        0 0 35px rgba(141,255,180,0.7);
    }

    .btn:hover{
      transform:scale(1.08);
      box-shadow:
        0 0 25px #b8ffcf,
        0 0 50px rgba(141,255,180,1);
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }
  </style>
</head>

<body>

  <!-- Falling stars generated by JS -->

  <div class="content">
    <h1>for you, mooniee</h1>
    <div class="small">made by ara</div>

    <button class="btn" onclick="nextPage()">
      next
    </button>
  </div>

  <script>
    // Create stars
    for(let i = 0; i < 120; i++){
      let star = document.createElement("div");
      star.classList.add("star");

      star.style.left = Math.random() * 100 + "vw";
      star.style.animationDuration = (Math.random() * 5 + 3) + "s";
      star.style.animationDelay = Math.random() * 5 + "s";

      let size = Math.random() * 3 + 1;
      star.style.width = size + "px";
      star.style.height = size + "px";

      document.body.appendChild(star);
    }

    function nextPage(){
      alert("Add your next surprise page here ✨");
    }
  </script>

</body>
</html>
